<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Eventos</title>
</head>
<body>

<h1>Lista de Eventos</h1>

<ul>
    <li th:each="event : ${events}">
        Nome:<span th:text="${event.name}"></span>
        <br>
        Organizador:<span th:text="${event.organizer.getName()}"></span>

        <br>
        Descrição:<span th:text="${event.description}"></span>

    </li>
</ul>

</body>
</html>
