spring:
  application:
    name: eventhub

  datasource:
    url: jdbc:postgresql://localhost:5432/eventhub
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false
